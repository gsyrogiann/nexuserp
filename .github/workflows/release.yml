name: Release Candidate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Audit
        run: npm run audit

      - name: Build
        run: npm run build

      - name: Package dist
        run: tar -czf nexuserp-dist.tgz dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexuserp-dist
          path: nexuserp-dist.tgz
